# ~/.post/config.yaml
#
# Configuration for plannen-post.
# Edit this file with `/plannen-post:post-config`.
# Run `/plannen-post:post` to compose and dispatch today's edition.


# Schedule is documentation only — the plugin itself does not schedule anything.
# Wire it up once via Claude Code's /schedule:
#
#   /schedule "weekdays at 07:00 Europe/Brussels: /plannen-post:post"
#
# The routine inherits your MCP servers and env vars from the shell where
# /schedule ran. Set TELEGRAM_BOT_TOKEN in ~/.zshenv (not ~/.zshrc) so the
# routine's non-interactive shell picks it up.
schedule:
  time: "07:00"
  days: [mon, tue, wed, thu, fri]
  tz: Europe/Brussels


# Sections compose the newspaper in the order they appear here.
# Each section's `id` must match a <!-- {{id}} --> slot in templates/newspaper.html.
#
# Kinds:
#   ai-intro    The model writes 2-3 lines from the full gathered dataset.
#   ai-outro    Same, but composed last and placed at the close.
#   mcp-call    Invoke an MCP tool. Fields: mcp, tool, args?
#   http-fetch  Curl a URL. Fields: url, as (text|json)
#
# Optional `prose:` hint on mcp-call / http-fetch sections tells the model
# how to turn raw data into 1-3 paragraphs. Free-form — anything you'd
# write in a prompt. Examples: "summarize-weather", "list the 3 most
# important threads with sender and one-line summary".
#
# Sections that fail (MCP not connected, HTTP error, malformed args) are
# skipped with a warning. The run continues.
sections:

  - id: intro
    kind: ai-intro

  - id: weather
    # If you have a weather MCP, use it instead:
    #   kind: mcp-call
    #   mcp: weather
    #   tool: get_forecast
    #   args: { location: Brussels }
    #
    # Otherwise this http-fetch hits open-meteo (no key required).
    # Swap the URL for meteo.be / wttr.in / any local weather endpoint.
    kind: http-fetch
    url: "https://api.open-meteo.com/v1/forecast?latitude=50.85&longitude=4.35&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code&timezone=Europe%2FBrussels&forecast_days=1"
    as: json
    prose: |
      One sentence on today's weather in Brussels. Lead with the headline
      (sunny, rain expected, cold snap, etc.), then high/low, then chance
      of precipitation if non-trivial. No more than 2 sentences.

  - id: events
    kind: mcp-call
    mcp: plannen
    tool: get_briefing_context
    prose: |
      Render the day's events as a tight list: time, title, who, where.
      One short line per event. Lead with anything time-critical or new.

  - id: email
    kind: mcp-call
    mcp: gmail
    tool: search_threads
    args:
      query: "is:unread newer_than:1d -category:promotions -category:social"
      max_results: 15
    prose: |
      Pick the 3-5 threads that look most worth knowing about (real people,
      replies expected, deadlines, money). For each: sender, one-line
      summary, and why it matters. Skip newsletters and bulk mail.

  - id: outro
    kind: ai-outro


# Delivery channels. The post goes to every configured channel — channels
# are the archive. No persistence beyond what the channels themselves keep.
delivery:

  - channel: gmail
    mode: draft               # only "draft" is supported in v1; Gmail MCP has no send
    to: me@example.com
    subject: "Post — {{date}}" # {{date}} → "Fri 22 May 2026"

  - channel: telegram
    bot_token_env: TELEGRAM_BOT_TOKEN  # name of the env var holding the bot token
    chat_id: "REPLACE_WITH_YOUR_CHAT_ID"
